<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Drug</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            margin:0;
            padding:0;
            font-family:Arial, Helvetica, sans-serif;
            background:linear-gradient(135deg,#00c6ff,#0072ff);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .card{
            width:700px;
            border:none;
            border-radius:25px;
            overflow:hidden;
            box-shadow:0 15px 40px rgba(0,0,0,.3);
        }

        .row{
            min-height:650px;
        }

        .left{
            background:url("https://images.unsplash.com/photo-1587854692152-cbe660dbde88?auto=format&fit=crop&w=900&q=80");
            background-size:cover;
            background-position:center;
        }

        .right{
            padding:40px;
            background:white;
        }

        h2{
            text-align:center;
            color:#0d6efd;
            font-weight:bold;
            margin-bottom:30px;
        }

        .form-control{
            border-radius:12px;
        }

        textarea{
            resize:none;
        }

        .btn-save{
            width:100%;
            background:#198754;
            color:white;
            font-size:18px;
            border-radius:12px;
            border:none;
            padding:10px;
        }

        .btn-save:hover{
            background:#157347;
        }

        .back{
            text-decoration:none;
            display:block;
            text-align:center;
            margin-top:20px;
            font-weight:bold;
        }

    </style>

</head>
<body>

<div class="card">

<div class="row g-0">

<div class="col-md-5 left"></div>

<div class="col-md-7 right">

<h2>💊 Create New Drug</h2>

<form method="POST">

{% csrf_token %}

<div class="mb-3">
<label class="form-label">Drug Name</label>
<input type="text" name="name" class="form-control" placeholder="Enter drug name" required>
</div>

<div class="mb-3">
<label class="form-label">Description</label>
<textarea name="desc" rows="4" class="form-control" placeholder="Enter description"></textarea>
</div>

<div class="mb-3">
<label class="form-label">Price</label>
<input type="number" step="0.01" name="price" class="form-control" placeholder="0.00" required>
</div>

<div class="mb-3">
<label class="form-label">Fabric</label>
<input type="text" name="fabric" class="form-control" placeholder="Manufacturer">
</div>

<div class="form-check mb-4">
<input class="form-check-input" type="checkbox" name="is_active" id="active">
<label class="form-check-label" for="active">
Available
</label>
</div>

<button type="submit" class="btn-save">
💾 Save Drug
</button>

</form>

<a href="{% url 'drug_list' %}" class="back">
⬅ Back to Drug List
</a>

</div>

</div>

</div>

</body>
</html>
