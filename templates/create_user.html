<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create User</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            margin:0;
            padding:0;
            background:linear-gradient(135deg,#667eea,#764ba2);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:Arial, Helvetica, sans-serif;
        }

        .card{
            width:800px;
            border:none;
            border-radius:25px;
            overflow:hidden;
            box-shadow:0 15px 40px rgba(0,0,0,.3);
        }

        .left{
            background:url("https://images.unsplash.com/photo-1576091160550-2173dba999ef?auto=format&fit=crop&w=900&q=80");
            background-size:cover;
            background-position:center;
            min-height:650px;
        }

        .right{
            background:white;
            padding:40px;
        }

        h2{
            text-align:center;
            color:#6f42c1;
            font-weight:bold;
            margin-bottom:30px;
        }

        .form-control{
            border-radius:12px;
        }

        .btn-save{
            width:100%;
            background:#198754;
            color:white;
            border:none;
            border-radius:12px;
            padding:12px;
            font-size:18px;
            font-weight:bold;
        }

        .btn-save:hover{
            background:#157347;
        }

        .back{
            display:block;
            text-align:center;
            margin-top:20px;
            text-decoration:none;
            font-weight:bold;
        }

    </style>

</head>
<body>

<div class="card">

<div class="row g-0">

<div class="col-md-5 left"></div>

<div class="col-md-7 right">

<h2>👤 Create New User</h2>

<form method="POST">

{% csrf_token %}

<div class="mb-3">
<label class="form-label">Full Name</label>
<input type="text" name="full_name" class="form-control" placeholder="Enter full name" required>
</div>

<div class="mb-3">
<label class="form-label">Email</label>
<input type="email" name="email" class="form-control" placeholder="Enter email" required>
</div>

<div class="mb-3">
<label class="form-label">Phone</label>
<input type="text" name="phone" class="form-control" placeholder="+998 90 123 45 67" required>
</div>

<div class="mb-3">
<label class="form-label">Password</label>
<input type="password" name="password" class="form-control" placeholder="Enter password" required>
</div>

<div class="form-check mb-4">
<input class="form-check-input" type="checkbox" name="is_active" id="active">
<label class="form-check-label" for="active">
Active User
</label>
</div>

<button type="submit" class="btn-save">
💾 Save User
</button>

</form>

<a href="{% url 'user_list' %}" class="back">
⬅ Back to User List
</a>

</div>

</div>

</div>

</body>
</html>
