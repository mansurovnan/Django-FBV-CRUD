<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Detail</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            margin:0;
            padding:0;
            background:linear-gradient(135deg,#667eea,#764ba2);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:Arial, Helvetica, sans-serif;
        }

        .card{
            width:900px;
            border:none;
            border-radius:25px;
            overflow:hidden;
            box-shadow:0 15px 40px rgba(0,0,0,.35);
        }

        .left{
            background:url("https://images.unsplash.com/photo-1576091160550-2173dba999ef?auto=format&fit=crop&w=900&q=80");
            background-size:cover;
            background-position:center;
            min-height:600px;
        }

        .right{
            background:white;
            padding:40px;
        }

        h2{
            text-align:center;
            color:#6f42c1;
            font-weight:bold;
            margin-bottom:30px;
        }

        .info{
            background:#f8f9fa;
            padding:15px;
            border-radius:12px;
            margin-bottom:15px;
            font-size:17px;
        }

        .badge{
            font-size:15px;
            padding:8px 15px;
        }

        .btn-back{
            width:100%;
            margin-top:20px;
        }

    </style>

</head>
<body>

<div class="card">

<div class="row g-0">

<div class="col-md-5 left"></div>

<div class="col-md-7 right">

<h2>👤 User Details</h2>

<div class="info">
<strong>Full Name:</strong> {{ user.full_name }}
</div>

<div class="info">
<strong>Email:</strong> {{ user.email }}
</div>

<div class="info">
<strong>Phone:</strong> {{ user.phone }}
</div>

<div class="info">
<strong>Password:</strong> {{ user.password }}
</div>

<div class="info">
<strong>Created At:</strong> {{ user.created_at }}
</div>

<div class="info">
<strong>Status:</strong>

{% if user.is_active %}
<span class="badge bg-success">Active</span>
{% else %}
<span class="badge bg-danger">Inactive</span>
{% endif %}

</div>

<a href="{% url 'user_list' %}" class="btn btn-primary btn-lg btn-back">
⬅ Back to User List
</a>

</div>

</div>

</div>

</body>
</html>
